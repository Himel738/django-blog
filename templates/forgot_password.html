{% extends 'base.html' %}

{% block content %}
{% load crispy_forms_tags %}

<h3 class="text-center">Forgot Password</h3>
<p class="text-center">Enter your email address to receive a password reset link.</p>

<form action="{% url 'forgot_password' %}" method="POST" style="width:500px; margin:auto;">
    {% csrf_token %}
    {{ form | crispy }}
    <button type="submit" class="btn btn-warning">Send Reset Link</button>
    <br><br>
    <a href="{% url 'login' %}" class="btn btn-link">Back to Login</a>
</form>
{% endblock %}
