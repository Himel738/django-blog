{% extends 'base.html' %}

{% block content %}
{% load crispy_forms_tags %}

<h3 class="text-center">Set New Password</h3>

{% if validlink %}
    <form action="" method="POST" style="width:500px; margin:auto;">
        {% csrf_token %}
        {{ form | crispy }}
        <button type="submit" class="btn btn-warning">Set Password</button>
    </form>
{% else %}
    <div style="width:500px; margin:auto; text-align: center;">
        <p class="alert alert-danger">The password reset link is invalid or has expired. Please request a new one.</p>
        <a href="{% url 'forgot_password' %}" class="btn btn-warning">Request New Link</a>
    </div>
{% endif %}

{% endblock %}
